name = "omniroute-cloud"
main = "src/worker.ts"
compatibility_date = "2024-09-01"
compatibility_flags = ["nodejs_compat"]

# ─────────────────────────────────────────────────────────────────────────────
# KV namespace for storing sync bundles.
#
# When deploying via the Cloudflare "Deploy to Workers" button
# (https://deploy.workers.cloudflare.com/?url=...), Cloudflare automatically
# provisions a new KV namespace and replaces the id below with the real one.
#
# When deploying manually with `wrangler deploy`, run this first:
#   wrangler kv namespace create BUNDLES
# Then paste the returned id below.
# ─────────────────────────────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "BUNDLES"
id = "placeholder-replaced-by-deploy-button"

# ─────────────────────────────────────────────────────────────────────────────
# CLOUD_SYNC_SECRET is NOT defined here. It is a secret, not a var — defining
# it in wrangler.toml would commit it to Git (security risk).
#
# After deploying the Worker, set the secret with one of these methods:
#
# Method A — Wrangler CLI (recommended for manual deploys):
#   openssl rand -hex 32  # generate a random secret
#   wrangler secret put CLOUD_SYNC_SECRET
#   # paste the generated secret when prompted
#
# Method B — OmniRoute /setup endpoint (recommended for Deploy Button):
#   After deploying via the Deploy Button, open OmniRoute's dashboard,
#   go to Settings → Cloud Sync → "Connect via Deploy Button", and paste
#   the Worker URL. OmniRoute will call GET /setup on the Worker, which
#   generates a random secret, stores it as a Worker secret, and returns
#   it once so OmniRoute can save it locally.
#
# Method C — Cloudflare Dashboard:
#   Workers & Pages → your worker → Settings → Variables and Secrets → Add
#   Type: Secret, Name: CLOUD_SYNC_SECRET, Value: <your secret>
# ─────────────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────────────
# Optional: restrict allowed upstream provider hosts.
# Empty = allow all. Comma-separated list to restrict.
# ─────────────────────────────────────────────────────────────────────────────
# [vars]
# ALLOWED_UPSTREAM_HOSTS = "api.openai.com,api.anthropic.com,generativelanguage.googleapis.com"
